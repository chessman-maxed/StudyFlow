<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Dashboard - StudyFlow</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="study-plans.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
</head>

<body class="min-h-screen font-sans">
    <div id="vanta-bg" class="fixed inset-0 z-[-1]"></div>

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-2 text-teal-400 font-bold text-2xl">
                <i class="fas fa-graduation-cap"></i>
                StudyFlow
            </div>

            <!-- Navigation -->
            <div class="hidden md:flex items-center space-x-6">
                <a href="planner.html" class="font-medium transition-colors">
                    <i class="fas fa-plus-circle mr-1"></i>New Plan
                </a>
                <a href="landing.html" class="font-medium transition-colors">
                    <i class="fas fa-sign-out-alt mr-1"></i>Back to Home
                </a>
                <a href="progress.html" class="font-medium transition-colors">
                    <i class="fas fa-chart-line mr-1"></i>Progress
                </a>
                <button id="themeToggle" class="theme-toggle" title="Switch Theme">
                    <i class="fas fa-sun"></i>
                </button>

                <!-- Mobile Menu Button -->
                <button id="mobile-menu-btn" class="md:hidden">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>

            <!-- Mobile Navigation -->
            <div id="mobile-menu" class="md:hidden nav-mobile hidden">
                <div class="px-6 py-4 space-y-4">
                    <a href="planner.html" class="block py-2">
                        <i class="fas fa-plus-circle mr-2"></i>New Plan
                    </a>
                    <a href="landing.html" class="block py-2">
                        <i class="fas fa-sign-out-alt mr-2"></i>Back to Home
                    </a>
                    <a href="progress.html" class="block py-2">
                        <i class="fas fa-chart-line mr-2"></i>Progress
                    </a>
                    <button id="themeToggle" class="theme-toggle w-full justify-start text-left py-2">
                        <i class="fas fa-sun mr-2"></i>Theme
                    </button>
                </div>
            </div>
    </nav>

    <!-- MAIN DASHBOARD CONTENT -->
    <div class="pt-24 pb-12 px-4 max-w-7xl mx-auto flex flex-col md:flex-row gap-6">

        <!-- LEFT: CURRENT PLAN VIEW WITH CHECKBOXES -->
        <div class="md:w-2/3 flex flex-col">
            <div class="glass-card overflow-hidden flex flex-col">
                <!-- Header -->
                <div class="p-4 border-b flex justify-between items-center">
                    <h2 class="text-lg font-bold text-teal-300 flex items-center">
                        <i class="fas fa-clipboard-list mr-2"></i> Your Tasks
                    </h2>
                    <a href="progress.html" class="text-xs text-teal-400 hover:text-teal-300">View Progress <i class="fas fa-arrow-right ml-1"></i></a>
                </div>

                <!-- Plan Content with Checkboxes -->
                <div class="flex-1 overflow-y-auto p-4 custom-scrollbar max-h-[70vh]">
                    <div id="taskList" class="space-y-3 p-4 rounded-lg">
                        <!-- Tasks with checkboxes will be injected here -->
                        <div class="flex flex-col items-center justify-center py-12">
                            <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                            Loading your tasks...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: AI CHAT ASSISTANT (SMALLER) -->
        <div class="md:w-1/3 flex flex-col">
            <div class="glass-card overflow-hidden flex flex-col relative">
                <!-- Header -->
                <div class="p-3 border-b">
                    <h2 class="text-sm font-bold text-amber-300 flex items-center">
                        <i class="fas fa-robot mr-2"></i> AI Helper
                    </h2>
                </div>

                <!-- Chat History -->
                <div id="chatContainer" class="flex-1 overflow-y-auto p-3 space-y-3 custom-scrollbar chat-bg" style="max-height: 40vh;">
                    <!-- Initial Greeting -->
                    <div class="flex items-start gap-2">
                        <div class="w-6 h-6 rounded-full bg-amber-600 flex items-center justify-center shrink-0">
                            <i class="fas fa-robot text-xs"></i>
                        </div>
                        <div class="p-2 rounded-2xl rounded-tl-none text-xs shadow-md max-w-[90%]">
                            Ask me about your tasks!
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="p-3 border-t backdrop-blur-xl">
                    <form id="chatForm" class="flex gap-2 items-center">
                        <input type="text" id="userInput"
                            class="flex-grow rounded-lg px-3 py-2 text-sm focus:outline-none transition-colors w-full"
                            placeholder="Ask..." autocomplete="off">
                        <button type="submit"
                            class="bg-amber-600 hover:bg-amber-700 rounded-lg px-3 py-2 transition-transform active:scale-95 shadow-lg flex items-center justify-center w-8 shrink-0">
                            <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <!-- Theme Script -->
    <script src="theme.js"></script>



    <!-- Scripts -->
    <script src="study-plans.js"></script>

    <script>
        document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
            document.getElementById('mobile-menu')?.classList.toggle('hidden');
        });
    </script>
</body>

</html>
